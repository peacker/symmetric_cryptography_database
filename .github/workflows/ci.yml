name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read

jobs:
  validate-and-build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Validate datasets and process alignment
        run: make test PYTHON=python

      - name: Build database, exports, and static site
        run: make build-site PYTHON=python

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: db-and-viz
          path: build/
