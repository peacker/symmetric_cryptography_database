  - id: nist_sha1_sha2_standardization
    name: NIST SHA-1 / SHA-2 Standardization
    organizer: NIST
    start_year: 1993
    end_year: 2002
    url: https://csrc.nist.gov/publications/detail/fips/180/4/final
    notes: NIST standardization of SHA-1 (FIPS 180-1, 1995) and SHA-2 family (SHA-256/384/512, FIPS 180-2, 2002). SHA was first published as FIPS 180 in 1993; FIPS 180-4 (2012) consolidated all variants. The entire process was closed-source, with no public competition or evaluation.
    stages:
      - id: standardized
        label: Standardized
        kind: outcome
        participants:
          - family_id: sha1_sha2
          - family_id: sha2

  - id: eu_ripe_project
    name: RIPE Project
    organizer: RIPE Consortium
    start_year: 1988
    end_year: 1992
    url: https://ir.cwi.nl/pub/5295/5295D.pdf
    notes: EU RACE Integrity Primitives Evaluation project that produced RIPEMD (1992). RIPEMD-160, a strengthened 160-bit successor, was published in 1996 by Dobbertin, Bosselaers, and Preneel.
    stages:
      - id: category_unkeyed
        label: Unkeyed integrity primitives
        kind: category
        participants:
