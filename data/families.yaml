    influences: []
    notes: >
      RC4 (Rivest Cipher 4) is a stream cipher using a key scheduling
      algorithm (KSA) followed by a pseudo-random generation algorithm (PRGA).
      Despite historical use in TLS and WEP, RC4 has known weaknesses and is
      deprecated for new applications.
      RC4 is not defined by an official standard. 
      It was originally a proprietary trade secret designed by 
      Ron Rivest for RSA Security in 1987.
      The algorithm was anonymously leaked to the internet in 1994 and 
      became broadly known as "Alleged RC4" (often abbreviated as ARC4 or ARCFOUR).

