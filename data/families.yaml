version: 1
families:
  - id: rijndael
    name: Rijndael
    year: 1998
    primitive_type: block_cipher
    target_applications:
      - generic
    characteristics:
      components:
        - id: sbox
          params: {input_bits: 8, output_bits: 8}
        - id: field_matrix_mul
          params: {field_size: 256}
        - id: word_permutation
          params: {word_size_bits: 8}
        - id: xor
        - id: constant
    publication_ids:
      - daemen_rijmen_1998_rijndael
    standard_ids: []
    process_ids:
      - aes_competition_nist_1997_2000
    influences: []
    notes: >
      Rijndael supports variable block sizes (128, 192, 256 bits) and
      independently chosen key sizes. The AES standard restricts block size
      to 128 bits and standardises three key sizes, making AES a special case.

  - id: aes
    name: AES
    year: 2001
    primitive_type: block_cipher
    target_applications:
      - generic
      - storage
    characteristics:
      block_size_bits: 128
      components:
        - id: sbox
          params: {input_bits: 8, output_bits: 8}
        - id: field_matrix_mul
          params: {field_size: 256}
        - id: word_permutation
          params: {word_size_bits: 8}
        - id: xor
        - id: constant
    publication_ids: []
    standard_ids:
      - fips_197
      - sp_800_38e
    process_ids:
      - aes_competition_nist_1997_2000
    influences:
      - source_family_id: rijndael
        relation: special_case_of
        note: AES fixes Rijndael's block size to 128 bits and standardises three key sizes.

  - id: salsa
    name: Salsa
    year: 2008
    primitive_type: update_function
    target_applications:
      - generic
      - software
    characteristics:
      state_size_bits: 512
      components:
        - id: add_mod
          params: {modulus: 4294967296}
        - id: xor
        - id: rotation_fixed
        - id: constant
    publication_ids:
      - bernstein_2008_salsa20
    standard_ids: []
    process_ids: []
    influences: []
    notes: >
      ARX design. Salsa20 is the full-round variant; Salsa20/12 and
      Salsa20/8 are reduced-round speed-optimised variants.

  - id: chacha
    name: ChaCha
    year: 2008
    primitive_type: update_function
    target_applications:
      - generic
      - software
    characteristics:
      state_size_bits: 512
      components:
        - id: add_mod
          params: {modulus: 4294967296}
        - id: xor
        - id: rotation_fixed
        - id: constant
    publication_ids:
      - bernstein_2008_chacha
    standard_ids: []
    process_ids: []
    influences:
      - source_family_id: salsa
        relation: improvement_of
        note: >
          ChaCha reorganises the Salsa quarterround to achieve better diffusion
          per round, improving resistance to differential cryptanalysis.

  - id: present
    name: PRESENT
    year: 2007
    primitive_type: block_cipher
    target_applications:
      - iot
      - constrained_hardware
    characteristics:
      block_size_bits: 64
      components:
        - id: sbox
          params: {input_bits: 4, output_bits: 4}
        - id: bit_permutation
        - id: xor
        - id: constant
    publication_ids:
      - bogdanov_2007_present
    standard_ids: []
    process_ids: []
    influences: []

  - id: gift
    name: GIFT
    year: 2017
    primitive_type: block_cipher
    target_applications:
      - iot
      - constrained_hardware
    characteristics:
      components:
        - id: sbox
          params: {input_bits: 4, output_bits: 4}
        - id: bit_permutation
        - id: xor
        - id: constant
    publication_ids:
      - banik_2017_gift
    standard_ids: []
    process_ids: []
    influences:
      - source_family_id: present
        relation: inspired_by
        note: >
          GIFT explicitly builds on PRESENT's SPN structure, improving
          hardware efficiency and key-schedule simplicity.
