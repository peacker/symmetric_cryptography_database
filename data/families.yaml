  - id: threeway
    name: 3-Way
    construction_ids:
      - self_reciprocal_spn
    round_ids:
      - threeway_round
    target_applications:
      - generic
    characteristics:
      block_size_bits: 96
      components:
        - id: sbox
          params: { input_bits: 3, output_bits: 3 }
        - id: linear_transform
          params: { name: theta }
        - id: bit_permutation
          params: { names: [pi_1, pi_2] }
        - id: xor
        - id: constant
    reference_ids:
      - daemen_1991_threeway
    process_ids: []
    influences: []
    innovative_ideas:
      - id: threeway_self_reciprocal
        name: Self-reciprocal structure
        note: Encryption and decryption use the same circuit; the cipher is its own inverse (except for the key schedule which is reversed).
      - id: threeway_theta
        name: Theta linear diffusion
        note: >
          Linear layer θ defined by the primitive polynomial e(x) = 1+x+x²+x³+x⁵+x⁶+x¹⁰
          over GF(2), providing diffusion across 32-bit words of the 96-bit block.
    notes: >
      3-Way is a 96-bit block cipher designed by Joan Daemen (1991). Its self-reciprocal
      structure means encryption and decryption share the same circuit, differing only in
      the key schedule. The nonlinear layer γ operates on 3-bit S-boxes; the linear layer
      θ provides diffusion; permutations π₁ and π₂ provide bit rearrangement. The block
      is treated as three 32-bit words. Designed to resist differential and linear
      cryptanalysis; the cipher performs 11 rounds.

  - id: macguffin
    name: MacGuffin
    construction_ids:
      - gufn
    round_ids:
      - macguffin_round
    target_applications:
      - generic
    characteristics:
      block_size_bits: 64
      components:
        - id: sbox
          params: { input_bits: 6, output_bits: 2, count: 8 }
        - id: xor
