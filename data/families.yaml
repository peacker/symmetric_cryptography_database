  - id: argon2_memory_hard_compression
    name: Memory-hard compression function using large memory array
    note: 'Argon2 fills a large array of 1 KB blocks using compression function G,
      which XORs two existing blocks and applies the Blake2b-derived permutation P
      twice (row-then-column). The data-dependent (Argon2d) or data-independent (Argon2i)
