    innovative_ideas:
      - id: grain_lfsr_nlfsr_pair
        name: Paired LFSR/NFSR for guaranteed minimum period with nonlinearity
        note: >
          The 80-bit LFSR provides the guaranteed minimum period while the 80-bit NFSR
          (feedback masked by LFSR output) provides nonlinearity. Both share the same
          initialization procedure.
    notes: >
      Grain (v0) is a hardware-oriented bit-serial stream cipher. State = 80-bit LFSR
      (primitive polynomial f(x) of degree 80) + 80-bit NFSR (nonlinear feedback g(x))
      = 160 bits total. Filter function h(x) of degree 3 on 5 taps (from both registers)
      XORed with one NFSR bit yields 1 keystream bit per clock. Key=80 bits, IV=64 bits.
      Key initialization clocks 160 times with output fed back. ECRYPT eSTREAM Phase 2,
      hardware focus. Superseded by Grain-128 and Grain-128a.

  - id: mickey
    name: MICKEY
    construction_ids:
      - irregular_clock_register_pair
    round_ids:
      - mickey_clock
    target_applications:
      - hardware
      - constrained_hardware
    characteristics:
      state_size_bits: 160
      components:
        - id: lfsr
          params: { length: 80 }
        - id: nlfsr
          params: { length: 80 }
        - id: xor
    reference_ids:
      - babbage_2005_mickey
    process_ids:
      - ecrypt_stream_cipher_project_2004_2008
    influences: []
    innovative_ideas:
      - id: mickey_mutual_irregular_clocking
        name: Mutual irregular clocking between register pair
        note: >
          Two 80-bit registers R (linear) and S (nonlinear) each generate a control bit
          that governs the other's clocking behaviour; this mutual dependence provides
          statistical properties superior to self-controlled clocking schemes.
    notes: >
      MICKEY (Mutual Irregular Clocking KEYstream generator) is a hardware-oriented
      synchronous stream cipher by Babbage and Dodd (eSTREAM v1, 2005). Two 80-bit
      registers R (linear) and S (nonlinear) mutually clock each other irregularly based
      on CONTROL_BIT derived from their combined state. Output: z_i = r_0 ⊕ s_0 per clock.
      Key=80 bits, IV=0 to 80 bits (variable). Maximum keystream per (K,IV) pair = 2^40 bits.

  - id: decim
    name: DECIM
    construction_ids:
