    (FSE 1994). It introduced the Generalized Unbalanced Feistel Network (GUFN): the
    64-bit block is split asymmetrically into a 16-bit "target" and a 48-bit "control"
    half. The round function uses 8 DES-derived 6×2 S-boxes. Key=128 bits; 32 rounds.
