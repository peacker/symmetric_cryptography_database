      - sorkin_1983_lucifer
    process_ids: []
    influences:
      - source_family_id: des
        relations:
          - related_to
        note: DES was a simplified and modified descendant of Lucifer; IBM designed both.
    innovative_ideas:
      - id: lucifer_key_controlled_sbox
        name: Key-controlled S-box selection
        note: >
          A single key-controlled bit selects between two different 4×4 S-boxes (S₀ and S₁)
          at each bit position, making the substitution key-dependent.
    notes: >
      Lucifer was an early IBM cipher (circa 1971-1973), the precursor to DES. The Sorkin (1983)
      description specifies a 128-bit block with 128-bit key and 16 rounds. The key controls
      which of two 4-bit S-boxes (S₀ or S₁) is applied at each position per round. DES was
      derived from a later, weakened variant of Lucifer with a smaller block (64 bits).

  - id: mir_1
    name: MIR-1
    construction_ids:
