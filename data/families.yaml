  - sha2_64bit_round
  notes: SHA-2 is a family of six Merkle-Damgård hash functions (SHA-224, SHA-256,
    SHA-384, SHA-512, SHA-512/224, SHA-512/256) standardised by NIST. All use Davies-Meyer
    feedforward and a σ-function message schedule. The 32-bit branch (SHA-224/256)
    uses 512-bit blocks and 64 rounds; the 64-bit branch (SHA-384/512 and the /224
    /256 truncated variants) uses 1024-bit blocks and 80 rounds. FIPS 180-2 (2002)
    introduced SHA-256/384/512; FIPS 180-3 (2008) added SHA-224; FIPS 180-4 (2015)
    added SHA-512/224 and SHA-512/256 and is the current standard.
