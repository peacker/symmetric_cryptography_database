  notes: 'LEX (Leak EXtraction) is an AES-based stream cipher by Alex Biryukov, submitted
    to eSTREAM. State: 128-bit AES state S + 128-bit expanded key (256 bits total).
    Operation: IV is encrypted once with AES to form initial state S; then each AES
    round leaks 4 bytes from fixed positions of the intermediate state (bytes b_{0,0},
    b_{2,0}, b_{0,2}, b_{2,2} at odd rounds; b_{0,1}, b_{2,1}, b_{0,3}, b_{2,3} at
    even rounds), producing 40 bytes per AES invocation (slightly modified last round).
    Key=128, 192 or 256 bits; IV=128 bits. Performance: ~2.5× faster than AES in CTR
    mode. Key re-setup every 500 AES encryptions (more secure variant).

    '
