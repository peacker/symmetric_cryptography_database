        name: T-function automaton for guaranteed long period
        note: >
          MIR-1 uses a T-function operating on 64-bit registers to generate a provably
          long-period keystream. A T-function's single-direction carry propagation guarantees
          the period is at least 2^63.
    notes: >
      MIR-1 is a 64-bit-oriented synchronous stream cipher by Alexander Maximov (2002).
      Despite being listed as block_cipher in some sources including this checklist, MIR-1
      is explicitly described as a stream cipher in the original paper. Keystream is
      generated by a T-function operating on 6 64-bit registers (4 loop-state registers
      x₀–x₃ and 2 automaton registers A, B), yielding 64 keystream bits per round.
      Total state = 6×64 = 384 bits. Key=128 bits, IV=64 bits.

  - id: achterbahn
