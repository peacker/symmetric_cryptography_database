        name: NLFSR combiner with feedforward output functions
        note: >
          Eight primitive NLFSRs (lengths 22,23,25,26,27,28,29,31) each have modifiable
          linear feedforward output functions combined by a degree-3, 4th-order correlation-immune
          Boolean function R, configured during key/IV loading by a 9th register V.
    notes: >
      Achterbahn is a hardware-oriented binary synchronous stream cipher. The active
      encryption state consists of 8 primitive binary NLFSRs of lengths 22, 23, 25, 26,
      27, 28, 29, 31 bits (total 22+23+25+26+27+28+29+31 = 211 bits). A 9th register V
      (64-bit NLFSR) is used only during key/IV loading to set the linear feedforward
      output functions of the 8 driving NLFSRs; V does NOT change during encryption.
      Output: combined by balanced Boolean function R (degree 3, 4th-order correlation
      immune). Key=80 bits, IV=0 to 64 bits (multiples of 8). ECRYPT eSTREAM 2005.

