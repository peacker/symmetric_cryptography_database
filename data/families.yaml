  notes: 'Aagaard et al. 2019. WAGE is a 259-bit permutation (37 stages × 7 bits over
    F_2^7) used in a unified duplex sponge AEAD mode. Linear layer: LFSR with primitive
    feedback polynomial l(y) = y^37+y^31+y^30+y^26+y^24+y^19+y^13+y^12+y^8+y^6+ω over
    F_2^7. Nonlinear components: WGP7 (Welch-Gong Permutation, decimation d=13) and
    SB (7-bit S-box constructed via nonlinear transformation Q and bit permutation
    P). Rate=64, capacity=195.

    '
