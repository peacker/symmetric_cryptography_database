      tradeoff: 3 passes (96 steps/block) is fastest; 5 passes (160 steps/block) is
      most secure. Five Boolean functions f1..f5 are defined; passes 1..5 use f1..f5
      in order.

      '
  - id: haval_variable_output
    name: Variable output length (128, 160, 192, 224, 256 bits)
    note: 'The final 256-bit chaining variable is optionally folded to produce shorter
      digests by XOR-combining groups of 32-bit words. Pass count and digest length
      are both embedded in the padding to prevent extension attacks.

      '
  notes: 'HAVAL (AUSCRYPT 1992, Zheng/Pieprzyk/Seberry) is a Merkle-Damgård hash with
    1024-bit blocks processed in 3, 4, or 5 passes of 32 word-operations each (96/128/160
    total steps). Chaining variable = 8 × 32-bit words (256 bits). Output reduced
    to 128, 160, 192, 224, or 256 bits. All 15 combinations are defined.

    '
