    process_ids: []
    influences:
      - source_family_id: des
        relations:
          - inspired_by
        note: MacGuffin's 8 S-boxes (6→2 bits) are DES-derived, adapted for the GUFN structure.
    innovative_ideas:
      - id: macguffin_gufn
        name: Generalized Unbalanced Feistel Network (GUFN)
        note: >
          MacGuffin introduced the GUFN where the 64-bit block is split into a 16-bit
          target half and a 48-bit control half, unlike a standard balanced Feistel split.
    notes: >
      MacGuffin is a 64-bit block cipher designed by Matt Blaze and Bruce Schneier (FSE 1994).
      It introduced the Generalized Unbalanced Feistel Network (GUFN): the 64-bit block is
      split asymmetrically into a 16-bit "target" and a 48-bit "control" half. The round
      function uses 8 DES-derived 6×2 S-boxes. Key=128 bits; 32 rounds. Later found to have
      structural weaknesses related to the asymmetric GUFN construction.

  - id: lucifer
    name: Lucifer
    construction_ids:
