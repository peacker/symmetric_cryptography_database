  innovative_ideas:
  - id: salsa_arx_quarterround
    name: ARX quarterround
    note: The add-rotate-xor quarterround structure shared across Salsa family variants.
  - id: salsa_column_diagonal_mixing
    name: Column/diagonal mixing
    note: The state reordering that alternates column and diagonal rounds for diffusion.
  notes: 'Salsa20 is a 512-bit ARX stream-cipher family introduced as the Snuffle
    2005 encryption function. Salsa20 uses 20 rounds; Salsa20/12 and Salsa20/8
    are reduced-round variants. XSalsa20 extends Salsa20 from a 64-bit nonce to
    a 192-bit nonce through HSalsa20 subkey derivation.

    '
- id: chacha
  name: ChaCha
  notes: 'ChaCha is Bernstein’s ARX stream-cipher family and a refinement of Salsa20.
    The IETF ChaCha20 profile uses a 256-bit key, 96-bit nonce, and 32-bit counter.
    RFC 7539 standardized that profile and its block function in 2015; RFC 8439
    replaced it in 2018.'
  construction_ids:
  - arx_permutation_network
  round_ids:
  - chacha_quarterround
  target_applications:
  - generic
  - software
  characteristics:
    state_size_bits: 512
    components:
    - id: add_mod
      params:
        modulus: 4294967296
    - id: xor
    - id: rotation_fixed
    - id: constant
  reference_ids:
