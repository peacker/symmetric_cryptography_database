    note: SHA-2 extends the SHA-1 design to 32- and 64-bit word variants with larger
      state sizes and a σ-function message schedule instead of a single rotation XOR.
  innovative_ideas:
  - id: sha2_sigma_schedule
    name: 'σ-function message schedule (32-bit: SHA-224/256; 64-bit: SHA-384/512)'
    note: SHA-256 expands 16 words to 64 using σ0 = ROTR-7 ⊕ ROTR-18 ⊕ SHR-3 and σ1
      = ROTR-17 ⊕ ROTR-19 ⊕ SHR-10. SHA-512 uses 64-bit analogues (σ0 = ROTR-1 ⊕ ROTR-8
      ⊕ SHR-7; σ1 = ROTR-19 ⊕ ROTR-61 ⊕ SHR-6) expanding to 80 words. The combination
      of rotations and shifts provides better diffusion than SHA-1's single ROTL.
  - id: sha2_prime_constants
    name: Round constants derived from fractional parts of cube roots of primes
    note: SHA-256 uses 64 constants K[0..63] (32-bit, cube roots of first 64 primes);
      SHA-512 uses 80 constants K[0..79] (64-bit). This nothing-up-my-sleeve design
      ensures the constants are not chosen maliciously.
  - id: sha2_truncated_variants
    name: Truncated-output variants (SHA-224, SHA-512/224, SHA-512/256) with independent
      IVs
    note: SHA-224 runs the SHA-256 compression function with distinct initial hash
      values and truncates to 224 bits. SHA-512/224 and SHA-512/256 run SHA-512 with
      IVs derived via the IV generation function of FIPS 180-4 §5.3.6 and truncate
      to 224 or 256 bits, offering 128-bit security with 512-bit block performance
      on 64-bit platforms.
