  notes: 'Montes & Penazzi 2019. Two related lightweight algorithms sharing a 256-bit
    permutation (four 64-bit words). Round function = LD ∘ S ∘ C: C adds round constant
    to x_1, S is a substitution layer, LD is a linear diffusion layer. Operations:
    AND, NOT, XOR, 64-bit rotations. Yarará (AEAD): rate=64, capacity=192, key=128,
    nonce=128, tag=128. Uses permutations π_I (10 rounds), π_AD/π_AE/π_F (6 rounds
    each). Coral (hash): rate=32, capacity=224, digest=256 bits.

    '
