      '
  notes: '3-Way is a 96-bit block cipher designed by Joan Daemen (1991). Its self-reciprocal
    structure means encryption and decryption share the same circuit, differing only
    in the key schedule. The nonlinear layer γ operates on 3-bit S-boxes; the linear
