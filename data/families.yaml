    and dispersion in hash tables and checksums. Output size n is a parameter (standard:
    32, 64, 128, 256 bits); state = n-bit accumulator. Processes one byte at a time.
    FNV-1a is a variant that XOR-s before multiplying (same prime and offset_basis),
    providing slightly better dispersion for short inputs. Public domain.

