          params: { count: 2, entries_per_table: 1024, entry_size_bits: 32 }
        - id: add_mod
          params: { modulus: 4294967296 }
        - id: xor
        - id: rotation_fixed
    reference_ids:
      - wu_2004_hc256
    process_ids:
      - ecrypt_stream_cipher_project_2004_2008
    influences: []
    innovative_ideas:
      - id: hc256_large_key_dependent_tables
        name: Continuously updated large key-dependent tables
        note: >
          HC-256 maintains two 1024-entry 32-bit tables P and Q (32 KB total) that are
          updated every step using nonlinear feedback. Every output word depends on
          the current secret table state, making statistical attacks extremely costly.
    notes: >
      HC-256 is a software-efficient synchronous stream cipher by Hongjun Wu (FSE 2004
      / eSTREAM). State: two 1024-entry 32-bit tables P and Q (65536 bits total) plus
      11 bits of counter = 65547 bits. Each step updates one table entry via nonlinear
      feedback and outputs one 32-bit keystream word via a table lookup XOR. Key=256 bits,
      IV=256 bits. Security claim: 2^128 effort to distinguish from random.
      HC-128 (128-bit key/IV) is a related but separate cipher not covered here.

  - id: rabbit
    name: Rabbit
    construction_ids:
      - coupled_counter_system
    round_ids:
      - rabbit_iteration
    target_applications:
      - generic
      - software
    characteristics:
      state_size_bits: 513
      components:
        - id: add_mod
          params: { modulus: 4294967296 }
        - id: xor
        - id: rotation_fixed
        - id: counter
          params: { count: 8, size_bits: 32 }
    reference_ids:
      - boesgaard_2003_rabbit
    process_ids:
      - ecrypt_stream_cipher_project_2004_2008
    influences: []
    innovative_ideas:
      - id: rabbit_coupled_g_function
        name: Coupled nonlinear counter g-function
        note: >
          Rabbit's 8 state variables are iterated by a coupled nonlinear g-function
          g_j(x,y) = ((x+y)^2 ⊕ (x+y)^2>>32) mod 2^32 with counter mixing, preventing
          straightforward linear algebraic attacks.
    notes: >
      Rabbit is a synchronous stream cipher first presented at FSE 2003 (eSTREAM software
      focus). Internal state: 8 32-bit state variables x_{j,i}, 8 32-bit counter variables
      c_{j,i}, and 1 carry bit φ = 513 bits total. Each iteration advances all 8 counters,
      applies the coupled g-function, and outputs 128 keystream bits extracted from 8
      state variables. Key=128 bits, IV=64 bits (optional IV setup applies 4 extra rounds).

  - id: f_fcsr
    name: F-FCSR
    construction_ids:
      - filtered_fcsr
    round_ids:
      - f_fcsr_step
    target_applications:
      - generic
      - hardware
    characteristics:
      state_size_bits: 196
      components:
        - id: fcsr
          params: { main_register_bits: 128, carry_register_bits: 68 }
        - id: linear_filter
          params: { type: xor }
    reference_ids:
      - arnault_2005_ffcsr
    process_ids:
      - ecrypt_stream_cipher_project_2004_2008
    influences: []
    innovative_ideas:
      - id: f_fcsr_carry_nonlinearity
        name: FCSR carry-based nonlinearity without explicit nonlinear filter
        note: >
          F-FCSR replaces LFSR XOR feedback with FCSR integer addition-with-carry,
          providing inherent nonlinearity without requiring a complex Boolean filter.
          The carry register acts as an implicit nonlinear element.
    notes: >
      F-FCSR (Filtered FCSR) is a stream cipher family based on Feedback with Carry Shift
      Registers (FCSRs) by Arnault and Berger (eSTREAM 2005). Main FCSR: 128-bit main
      register (k=128) + 68 carry cells (ℓ=68) = 196 bits total state. Keystream by
      XOR-filtering selected FCSR cells (static filter: SF, or dynamic/key-dependent: DF).
      Variants: F-FCSR-SF1, F-FCSR-SF8, F-FCSR-DF1, F-FCSR-DF8. Key=128 bits, IV=64 bits.
      Later found to have cryptanalytic weaknesses (Knellwolf-Meier 2011).

  - id: seal
    name: SEAL
    construction_ids:
      - table_driven_prf
    round_ids:
      - seal_inner_iteration
    target_applications:
      - generic
      - software
    characteristics:
      components:
        - id: lookup_table
          params: { names: [T, R, S] }
        - id: add_mod
          params: { modulus: 4294967296 }
        - id: xor
        - id: rotation_fixed
    reference_ids:
      - rogaway_1997_seal
    process_ids: []
    influences: []
    innovative_ideas:
      - id: seal_prf_stream
        name: Length-increasing pseudorandom function as stream cipher
        note: >
          SEAL is a pseudorandom function family mapping a 32-bit position index n to
          an arbitrarily long output (up to ~64 KB per index), enabling both sequential
          streaming and random-access decryption.
    notes: >
      SEAL 3.0 (Software Encryption ALgorithm) is a software-optimized pseudorandom
      function family by Rogaway and Coppersmith (1997). A 160-bit key is preprocessed
      via SHA-1 into three tables (T: 512 32-bit words, R: 4 32-bit words, S: 256 32-bit
      words). Given a 32-bit position index n, SEAL produces a pseudorandom stream using
      64 inner iterations per block of up to 64×1024 bytes. Used as a stream cipher when
      position index increments sequentially. Versions: 1.0 (1993), 2.0, 3.0 (1997).

  - id: sapphire
    name: Sapphire
    construction_ids:
      - permutation_based_stream
    round_ids:
      - sapphire_byte_step
    target_applications:
      - generic
      - software
    characteristics:
      state_size_bits: 2104
      components:
        - id: permutation_vector
          params: { size: 256, entry_size_bits: 8 }
        - id: xor
        - id: add_mod
          params: { modulus: 256 }
    reference_ids:
      - johnson_1995_sapphire
    process_ids: []
    influences:
      - source_family_id: rc4
        relations:
          - inspired_by
        note: Like RC4, Sapphire II uses a shuffled 256-byte permutation vector; unlike RC4 it adds plaintext/ciphertext feedback.
    innovative_ideas:
      - id: sapphire_pt_ct_feedback
        name: Plaintext and ciphertext feedback into permutation state
        note: >
          Sapphire II feeds both the plaintext and the ciphertext back into permutation
          shuffling each step, providing better resistance to known-plaintext attacks
          compared to pure keystream generators and rudimentary authentication properties.
    notes: >
      Sapphire II Stream Cipher by Michael Paul Johnson (1995). State: 256-byte permutation
      array cards[256] + indices a, b, c, d, m (5 bytes) + last_plain and last_cipher
      (2 bytes) = 263 bytes = 2104 bits total. Per step, up to 5 permutation elements are
      moved and 1 keystream byte is output, XORed with plaintext. Variable-length key
      (≥64 bits recommended). Plaintext and ciphertext are fed back into shuffling,
      providing implicit authentication. NOTE: the checklist spec year says 1995.

  - id: sfinks
    name: SFINKS
    construction_ids:
      - filtered_lfsr
    round_ids:
      - sfinks_clock
    target_applications:
      - hardware
      - constrained_hardware
    characteristics:
      state_size_bits: 256
      components:
        - id: lfsr
          params: { length: 256, polynomial_weight: 17 }
        - id: inversion_sbox
          params: { field: "GF(2^16)", degree: 15, nonlinearity: 65024 }
        - id: xor
    reference_ids:
      - braeken_2005_sfinks
    process_ids:
      - ecrypt_stream_cipher_project_2004_2008
    influences: []
    innovative_ideas:
      - id: sfinks_gf2_16_inversion
        name: Inversion S-box over GF(2¹⁶) as nonlinear filter
        note: >
          SFINKS uses the multiplicative inverse function over GF(2^16) as its nonlinear
          filter, achieving algebraic degree 15 and nonlinearity 65024 with a compact
          hardware implementation.
    notes: >
      SFINKS is a hardware-oriented synchronous stream cipher by Braeken et al. (KU Leuven,
      eSTREAM 2005). State: 256-bit Fibonacci LFSR (weight-17 primitive polynomial of degree
      256) + 64-bit shift register SR + 64-bit MAC register. The nonlinear filter applies
      the INV() function over GF(2^16) to 16 selected LFSR bits, producing 1 bit per clock.
      Key=80 bits, IV=80 bits. Resynchronization: 128 clock cycles. Includes a 64-bit MAC
      generation mechanism for message authentication.

  - id: yamb
    name: YAMB
    construction_ids:
      - lfsr_over_extension_field_with_memory
    round_ids:
      - yamb_step
    target_applications:
      - generic
      - software
    characteristics:
      state_size_bits: 3040
      components:
        - id: lfsr
          params: { length: 15, word_size_bits: 32, field: "GF(2^32)" }
        - id: lookup_table
          params: { size_bytes: 256, dynamically_updated: true }
        - id: shift_register
          params: { length: 16, word_size_bits: 32 }
        - id: add_mod
          params: { modulus: 4294967296 }
        - id: xor
    reference_ids:
      - lancrypto_2005_yamb
    process_ids:
      - ecrypt_stream_cipher_project_2004_2008
    influences: []
    innovative_ideas:
      - id: yamb_word_lfsr_with_dynamic_sbox
        name: Word-oriented LFSR over GF(2^32) with dynamically updated memory table
        note: >
          YAMB combines a 15-word LFSR over GF(2^32) with a 256-byte memory M that is
          continuously updated during keystream generation, introducing nonlinearity via
          the dynamic S-box lookup.
    notes: >
      YAMB is a synchronous stream cipher submitted to ECRYPT eSTREAM by LAN Crypto (2005).
      Internal state: LFSR L (15 32-bit cells over GF(2^32), 480 bits) + Memory M (256 bytes
      dynamically updated S-box table, 2048 bits) + Shift register R (16 32-bit cells,
      512 bits) = 3040 bits total. Output: 32 bits per step. Key=80–256 bits (any multiple
      of 16 bits); IV=32–128 bits (primary reference values: key=128 bits, IV=64 bits).

  - id: fnv_1
    name: FNV-1
    construction_ids:
      - stream_state_update_generator
    round_ids:
      - fnv1_byte_step
    target_applications:
      - hash_tables
      - checksums
      - data_lookup
    characteristics:
      state_size_bits: 64
      components:
        - id: mul_mod
        - id: xor
    reference_ids:
      - fowler_1991_fnv1
    process_ids: []
    influences: []
    innovative_ideas:
      - id: fnv1_multiplicative_prime_mixing
        name: Multiply-then-XOR per byte with FNV_prime and non-zero offset_basis
        note: >
          FNV-1 multiplies the n-bit accumulator by a carefully chosen prime (FNV_prime)
          and XOR-s in each input byte. The non-zero offset_basis (introduced over FNV-0)
          prevents trivial all-zero fixed points. 32-bit: FNV_prime=16777619,
          offset_basis=2166136261; 64-bit: FNV_prime=1099511628211,
          offset_basis=14695981039346656037.
    notes: >
      FNV-1 is a non-cryptographic, non-Merkle-Damgård hash designed for speed and
      dispersion in hash tables and checksums. Output size n is a parameter (standard:
      32, 64, 128, 256 bits); state = n-bit accumulator. Processes one byte at a time.
      FNV-1a is a variant that XOR-s before multiplying (same prime and offset_basis),
      providing slightly better dispersion for short inputs. Public domain.

  - id: haval
    name: HAVAL
    construction_ids:
      - davies_meyer
    round_ids:
      - haval_pass
    target_applications:
      - digital_signatures
      - message_authentication
      - checksums
    characteristics:
      block_size_bits: 1024
      state_size_bits: 256
      components:
        - id: add_mod
          params: { modulus: 4294967296 }
        - id: xor
        - id: rotation_fixed
        - id: constant
    reference_ids:
      - zheng_1992_haval
    process_ids: []
    influences:
      - source_family_id: md5
        relations: [inspired_by]
        note: HAVAL adopts the MD-family Merkle-Damgård structure and 32-bit word orientation.
    innovative_ideas:
      - id: haval_variable_passes
        name: Variable pass count (3, 4, or 5) over each 1024-bit block
        note: >
          Each 1024-bit block is processed 3, 4, or 5 times (passes), each pass using a
          different Boolean function and word permutation. This provides a security-performance
          tradeoff: 3 passes (96 steps/block) is fastest; 5 passes (160 steps/block) is most
          secure. Five Boolean functions f1..f5 are defined; passes 1..5 use f1..f5 in order.
      - id: haval_variable_output
        name: Variable output length (128, 160, 192, 224, 256 bits)
        note: >
          The final 256-bit chaining variable is optionally folded to produce shorter digests
          by XOR-combining groups of 32-bit words. Pass count and digest length are both
          embedded in the padding to prevent extension attacks.
    notes: >
      HAVAL (AUSCRYPT 1992, Zheng/Pieprzyk/Seberry) is a Merkle-Damgård hash with 1024-bit
      blocks processed in 3, 4, or 5 passes of 32 word-operations each (96/128/160 total
      steps). Chaining variable = 8 × 32-bit words (256 bits). Output reduced to 128, 160,
      192, 224, or 256 bits. All 15 combinations are defined.

  - id: md2
    name: MD2
    construction_ids:
      - permutation_based_hash
    round_ids:
      - md2_compression_round
    target_applications:
      - digital_signatures
      - message_authentication
    characteristics:
      block_size_bits: 128
      state_size_bits: 384
      components:
        - id: sbox
          params: { input_bits: 8, output_bits: 8, table_size: 256 }
        - id: xor
    reference_ids:
      - kaliski_1992_md2
    process_ids: []
    influences: []
    innovative_ideas:
      - id: md2_pi_sbox
        name: 256-byte permutation S derived from the digits of pi
        note: >
          MD2 uses a fixed 256-byte random permutation S (constructed from fractional
          digits of pi) applied in 18 iterative rounds to mix the 48-byte state buffer,
          providing nonlinearity without a key schedule.
      - id: md2_checksum_preprocessing
        name: 16-byte checksum appended before compression
        note: >
          MD2 prepends PKCS-style padding (1–16 bytes) and then appends a 16-byte
          checksum of the padded message before running the main compression loop.
          This binds the final hash to the complete message structure.
    notes: >
      MD2 (RFC 1319, 1992, Kaliski/RSA Laboratories) processes 16-byte (128-bit) blocks.
      State X = 48 bytes = 384 bits (initialized to 0). Each block processed in 18 rounds
      using the pi-derived S-table. Output = X[0..15] (128 bits). Designed for 8-bit
      microprocessors; much slower than MD4/MD5. Deprecated for cryptographic use.

  - id: md4
    name: MD4
    construction_ids:
      - davies_meyer
    round_ids:
      - md4_round
    target_applications:
      - digital_signatures
      - message_authentication
    characteristics:
      block_size_bits: 512
      state_size_bits: 128
      components:
        - id: add_mod
          params: { modulus: 4294967296 }
        - id: xor
        - id: rotation_fixed
        - id: and
        - id: or
        - id: not
    reference_ids:
      - rivest_1992_md4
    process_ids: []
    influences: []
    innovative_ideas:
      - id: md4_software_speed
        name: Three rounds of 16 boolean-function operations on 32-bit words for maximum speed
        note: >
          MD4 uses three distinct Boolean functions (F=choice, G=majority, H=parity) applied
          in 16 operations per round over a 512-bit message block, designed for maximum
          software speed on 32-bit processors. Constants derived from sqrt(2) and sqrt(3)
          are added in rounds 2 and 3.
    notes: >
      MD4 (RFC 1320, 1992, Rivest) processes 512-bit blocks in 3 rounds of 16 operations
      each (48 total) on a 4-word (128-bit) chaining state A,B,C,D. The Merkle-Damgård
      feedforward step XORs the original state back in after each block (Davies-Meyer mode).
      Weaknesses found by Dobbertin (1995); deprecated.

  - id: md5
    name: MD5
    construction_ids:
      - davies_meyer
    round_ids:
      - md5_round
    target_applications:
      - digital_signatures
      - message_authentication
      - checksums
    characteristics:
      block_size_bits: 512
      state_size_bits: 128
      components:
        - id: add_mod
          params: { modulus: 4294967296 }
        - id: xor
        - id: rotation_fixed
        - id: and
        - id: or
        - id: not
        - id: constant
    reference_ids:
      - rivest_1992_md5
    process_ids: []
    influences:
      - source_family_id: md4
        relations: [improvement_of]
        note: >
          MD5 adds a fourth round (function I), per-step sine-derived constants T[1..64],
          and changed shift amounts relative to MD4 to improve security.
    innovative_ideas:
      - id: md5_sine_constants
        name: 64 unique per-step constants derived from the sine function
        note: >
          MD5 uses T[i] = floor(4294967296 × |sin(i)|) for i=1..64, one constant per
          step across all four rounds. These pseudo-random constants break symmetry and
          prevent fixed-point attacks that affected MD4's simpler (or zero) round constants.
    notes: >
      MD5 (RFC 1321, 1992, Rivest) strengthens MD4 with a fourth round (function I) and
      unique per-step sine-derived constants. Processes 512-bit blocks in 4 rounds of 16
      operations each (64 total) on a 4-word (128-bit) state. Collisions found by Wang
      et al. (2004); deprecated for cryptographic use.

  - id: ripemd
    name: RIPEMD
    construction_ids:
      - davies_meyer
    round_ids:
      - ripemd_round
    target_applications:
      - digital_signatures
      - message_authentication
    characteristics:
      block_size_bits: 512
      state_size_bits: 160
      components:
        - id: add_mod
          params: { modulus: 4294967296 }
        - id: xor
        - id: rotation_fixed
        - id: and
        - id: or
        - id: not
    reference_ids:
      - dobbertin_1996_ripemd160
    process_ids:
      - eu_ripe_project
    influences:
      - source_family_id: md4
        relations: [improvement_of]
        note: >
          RIPEMD extends the MD4 design with two parallel computation lines and five
          rounds, addressing weaknesses found in MD4 and MD5.
    innovative_ideas:
      - id: ripemd_double_pipe
        name: Two parallel independent computation lines merged at end of each block
        note: >
          RIPEMD-160 runs two independent lines (left and right) over the same 512-bit
          block, using different round functions, constants, and message word orderings per
          round. The final result merges both lines with the incoming chaining variable,
          making a single-line attack insufficient to forge collisions.
    notes: >
      RIPEMD family developed in the EU RIPE project. The PDF in repo covers RIPEMD-160
      (1996 paper, Dobbertin/Bosselaers/Preneel). RIPEMD-160: block=512 bits,
      state=5×32=160 bits, 5 rounds × 16 steps = 80 operations per line, two parallel
      lines. RIPEMD-128 uses 4 × 32-bit state (128 bits), 4 rounds × 16 steps per line.

  - id: sha1_sha2
    name: SHA-1 / SHA-2
    construction_ids:
      - davies_meyer
    round_ids:
      - sha_round
    target_applications:
      - digital_signatures
      - message_authentication
      - key_derivation
      - random_number_generation
    characteristics:
      block_size_bits: 512
      state_size_bits: 160
      components:
        - id: add_mod
        - id: xor
        - id: rotation_fixed
        - id: shift_fixed
        - id: and
        - id: or
        - id: not
        - id: constant
    reference_ids:
      - nist_2002_fips180_2
    process_ids:
      - nist_standardization
    influences:
      - source_family_id: md4
        relations: [improvement_of]
        note: >
          SHA-1 improves on MD4/MD5 with a 160-bit state and a cross-mixing message
          schedule. SHA-2 extends to 256/384/512-bit digests and 64-bit words.
    innovative_ideas:
      - id: sha_message_schedule
        name: Expanded message schedule mixing 16 input words into 80 (SHA-1) or 64/80 (SHA-2) scheduled words
        note: >
          SHA-1 generates 80 scheduled words via ROTL-1(W_{i-3} XOR W_{i-8} XOR W_{i-14}
          XOR W_{i-16}). SHA-256/512 use σ-functions (mix of rotations and shifts) to
          produce 64 or 80 words. This makes it infeasible to isolate single message word
          positions, unlike MD4's direct word usage.
      - id: sha2_wide_pipe
        name: SHA-256/384/512 extended word widths and digest sizes for higher security
        note: >
          SHA-256 uses 8 × 32-bit words (256-bit state) with 64 rounds; SHA-512 uses
          8 × 64-bit words (512-bit state) with 80 rounds. SHA-384 truncates the SHA-512
          state to 384 bits. Per-round constants are derived from cube roots of the first
          64 (SHA-256) or 80 (SHA-512) prime numbers.
    notes: >
      FIPS 180-2 (NIST, 2002) specifies SHA-1, SHA-256, SHA-384, and SHA-512.
      SHA-1: block=512 bits, state=5×32=160 bits, 80 rounds. SHA-256: block=512 bits,
      state=8×32=256 bits, 64 rounds. SHA-384: block=1024 bits, state=8×64=512 bits,
      80 rounds. SHA-512: block=1024 bits, state=8×64=512 bits, 80 rounds. All use the
      Merkle-Damgård construction with Davies-Meyer feedforward.

  - id: tiger
    name: Tiger
    construction_ids:
      - davies_meyer
    round_ids:
      - tiger_pass
    target_applications:
      - digital_signatures
      - message_authentication
      - content_addressable_storage
    characteristics:
      block_size_bits: 512
      state_size_bits: 192
      components:
        - id: xor
        - id: add_mod
          params: { modulus: 18446744073709551616 }
        - id: sub_mod
          params: { modulus: 18446744073709551616 }
        - id: mul_mod
          params: { modulus: 18446744073709551616 }
        - id: sbox
          params: { input_bits: 8, output_bits: 64, num_sboxes: 4 }
        - id: shift_fixed
    reference_ids:
      - anderson_1995_tiger
    process_ids: []
    influences:
      - source_family_id: md4
        relations: [inspired_by]
        note: >
          Tiger adopts the Merkle-Damgård outer structure with 512-bit blocks and
          Davies-Meyer feedforward, but replaces 32-bit with 64-bit words and adds
          a key schedule between passes.
    innovative_ideas:
      - id: tiger_sbox_8to64
        name: Four S-boxes mapping 8 bits to 64 bits for 64-bit processor speed
        note: >
          Tiger's four S-boxes (t1..t4) each map 8 bits to 64 bits (4 × 256 entries × 8
          bytes ≈ 8 KB total). On 64-bit processors, one table lookup provides the full
          nonlinear mixing for one round step, producing a 64-bit output in a single
          memory access.
      - id: tiger_key_schedule_between_passes
        name: Message key schedule (XOR + add + subtract) applied between each of three passes
        note: >
          Between Tiger's three passes, an invertible key schedule mixes all eight 64-bit
          message words using XOR with fixed constants and 64-bit modular addition/subtraction.
          This prevents sparse-input attacks and ensures each pass sees a different message
          view without repeating the same linear transformation.
    notes: >
      Tiger (Anderson & Biham, 1995) was designed for fast hashing on 64-bit processors.
      Processes 512-bit blocks (eight 64-bit words) through 3 passes of 8 rounds each
      (24 rounds total). State = 3 × 64-bit (192 bits). Multipliers 5, 7, 9 are applied
      per pass to the S-box outputs. Three output variants: Tiger/192 (full state),
      Tiger/160 (first 160 bits), Tiger/128 (first 128 bits).

  - id: whirlpool
    name: Whirlpool
    construction_ids:
      - matyas_meyer_oseas
    round_ids:
      - whirlpool_cipher_round
    target_applications:
      - digital_signatures
      - message_authentication
      - key_derivation
    characteristics:
      block_size_bits: 512
      state_size_bits: 512
      components:
        - id: sbox
          params: { input_bits: 8, output_bits: 8 }
        - id: rotation_fixed
        - id: field_matrix_mul
          params: { field: "GF(2^8)", matrix: "8x8_circulant" }
        - id: xor
    reference_ids:
      - barreto_2003_whirlpool
    process_ids:
      - nessie_project
    influences:
      - source_family_id: rijndael
        relations: [inspired_by]
        note: >
          Whirlpool adopts the Wide Trail design strategy (SubBytes, ShiftColumns,
          MixRows) from AES/Rijndael for its internal cipher W, but uses a 512-bit state
          and 512-bit key with 10 rounds.
    innovative_ideas:
      - id: whirlpool_miyaguchi_preneel
        name: Miyaguchi-Preneel compression using a dedicated 512-bit block cipher W
        note: >
          Whirlpool uses H_i = W[H_{i-1}](m_i) XOR H_{i-1} XOR m_i, where W is a
          dedicated 512-bit cipher (not a repurposed AES) with 10 rounds and AES-inspired
          structure. The 8×8 MDS matrix over GF(2^8) achieves branch number 9, the
          maximum possible for an 8×8 matrix.
    notes: >
      Whirlpool (Barreto & Rijmen, revised 2003) is a 512-bit hash using a dedicated
      internal block cipher W with 10 rounds over an 8×8 GF(2^8) state matrix. Each round
      of W: γ (8→8 S-box), π (column permutation), θ (8×8 circulant MDS over GF(2^8)),
      σ[k] (key XOR). Key schedule = same round function with round constants. Compression
      function = Miyaguchi-Preneel: H_i = W[H_{i-1}](m_i) ⊕ H_{i-1} ⊕ m_i.

  # ── PHOTON-Beetle ─────────────────────────────────────────────────────────────

  - id: photon_beetle
    name: PHOTON-Beetle
    construction_ids:
      - sponge_permutation
    round_ids:
      - photon_beetle_round
    target_applications:
      - aead
      - hash
    characteristics:
      state_size_bits: 256
      components:
        - id: sbox
          params: { input_bits: 4, output_bits: 4, note: "PHOTON S-box: C,5,6,B,9,0,A,D,3,E,F,8,4,7,1,2" }
        - id: word_permutation
          params: { note: ShiftRows }
        - id: field_matrix_mul
          params: { field: "GF(2^4)", polynomial: "x^4+x+1", note: MixColumnSerial }
        - id: xor
        - id: constant
    reference_ids:
      - bao_2019_photon_beetle
    process_ids:
      - nist_lwc_2019_2023
    influences: []
    notes: >
      Bao et al. 2019. PHOTON-Beetle uses PHOTON256 (256-bit, 12 rounds, 8×8 array of 4-bit
      cells) in Beetle sponge mode. PHOTON256 round: AddConstant, SubCells (4-bit S-box),
      ShiftRows, MixColumnSerial (serial matrix M over GF(2^4), poly x^4+x+1). Beetle mode
      uses ρ function (Shuffle + XOR) for ciphertext generation; differs from standard Sponge
      Duplex. Primary AEAD: r=128 (PHOTON-Beetle-AEAD[128]), key=128, nonce=128, tag=128.

  # ── SIV-Rijndael256 ──────────────────────────────────────────────────────────

  - id: siv_rijndael256
    name: SIV-Rijndael256
    construction_ids:
      - stream_state_update_generator
    round_ids:
      - siv_rijndael256_round
    target_applications:
      - aead
      - hash
    characteristics:
      state_size_bits: 256
      components:
        - id: sbox
          params: { input_bits: 8, output_bits: 8, note: "Rijndael S-box (multiplicative inverse in GF(2^8))" }
        - id: word_permutation
          params: { note: "ShiftRows (offsets 0,1,3,4 for Nb=8)" }
        - id: binary_matrix_mul
          params: { note: "MixColumns over GF(2^8), poly x^8+x^4+x^3+x+1" }
        - id: xor
        - id: constant
    reference_ids:
      - bao_2019_siv_rijndael256
    process_ids:
      - nist_lwc_2019_2023
    influences: []
    notes: >
      Bao et al. 2019. Rijndael256 is the Rijndael block cipher with fixed block length 256
      bits (Nb=8) and key length 128 bits (Nk=4), 14 rounds. SPN: SubBytes (8-bit Rijndael
      S-box), ShiftRows (shifts 0,1,3,4), MixColumns (GF(2^8), x^8+x^4+x^3+x+1 irred. poly),
      AddRoundKey. SIV mode (nonce-misuse resistant): PRF F_K (CBC-MAC variant) generates
      tag/IV; OFB encryption E_K^7 produces ciphertext. One instance: n=256, k=128, tag=256,
      nonce=128. A 3-bit tweak (domain separator d) is injected into second column per round.

  # ── SIV-TEM-PHOTON ───────────────────────────────────────────────────────────

  - id: siv_tem_photon
    name: SIV-TEM-PHOTON
    construction_ids:
      - even_mansour
    round_ids:
      - siv_tem_photon_round
    target_applications:
      - aead
      - hash
    characteristics:
      state_size_bits: 256
      components:
        - id: sbox
          params: { input_bits: 4, output_bits: 4, note: "PRESENT S-box: C,5,6,B,9,0,A,D,3,E,F,8,4,7,1,2" }
        - id: word_permutation
          params: { note: ShiftRows }
        - id: field_matrix_mul
          params: { field: "GF(2^4)", polynomial: "x^4+x+1", note: MixColumnSerial }
        - id: xor
        - id: constant
    reference_ids:
      - bao_2019_siv_tem_photon
    process_ids:
      - nist_lwc_2019_2023
    influences: []
    notes: >
      Bao et al. 2019. TEM-PHOTON = Tweakable Even-Mansour with PHOTON P256 permutation.
      Block=256 bits, key=128 bits, tweak=128 bits. TEM uses 4 iterations, each with 5-round
      P256[d] (20 total rounds; P256 in original PHOTON has 12). P256 uses PRESENT 4-bit S-box,
      ShiftRows, MixColumnSerial over GF(2^4) (poly x^4+x+1), domain separator AddDomain[d].
      SIV mode on top: key=128, nonce=128, tag=256. One AEAD instance only.

  # ── SKINNY-AEAD ──────────────────────────────────────────────────────────────

  - id: skinny_aead
    name: SKINNY-AEAD
    construction_ids:
