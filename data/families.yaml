- id: shamash_and_shamashash
  name: Shamash & Shamashash
  construction_ids:
  - spn
  - sponge_permutation
  round_ids:
  - shamash_and_shamashash_round
  target_applications:
  - lightweight_aead
  - hash
  characteristics:
    state_size_bits: 320
    components:
    - id: xor
    - id: sbox
      params:
        input_bits: 5
        output_bits: 5
        num_sboxes: 64
    - id: rotation_fixed
    - id: binary_matrix_mul
      params:
        matrix: 5x5_GF2
    - id: constant
  reference_ids:
  - penazzi_2019_shamash
  process_participations:
  - process_id: lightweight_crypto_nist_2018_2023
    stage_ids:
    - round_1
    status: candidate
  influences: []
  innovative_ideas:
  - id: shamash_sponge_aead_dual
    name: Dual-purpose design covering both AEAD (Shamash) and hash (Shamashash)
    note: 'Shamash is an AEAD with 128-bit key, 128-bit nonce, 128-bit tag, and 320-bit
      state. Shamashash re-uses Shamash as a black box inside the BDPV sponge construction
      to produce a 256-bit hash with 64-bit rate and 256-bit capacity. The 320-bit
      permutation-based state = five 64-bit words W0..W4.

      '
  - id: shamash_5bit_sbox_layer
    name: 64 parallel 5-bit S-boxes over the 320-bit state
    note: 'The substitution layer applies 64 independent 5-bit-to-5-bit S-boxes across
      all 320 state bits in parallel. The diffusion layer combines fixed rotations,
      XOR mixing, and a 5×5 GF(2) matrix to provide full inter-word diffusion.

      '
  notes: 'Note: the checklist entry type says ''hash'' but Shamash itself is an AEAD;
    Shamashash is the associated 256-bit hash function. Both are derived from the
    same spec (§1 and §7 of the 2019 paper). Initialization uses 12 rounds; AD/encryption/finalization
    each use 9 (or 12 for finalization). Shamashash uses Shamash via the BDPV construction.

    '
