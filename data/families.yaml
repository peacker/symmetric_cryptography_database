    components:
    - id: add_mod
      params:
        modulus: 65536
    - id: xor
    - id: rotation_fixed
    - id: constant
  reference_ids:
  - shin_et_al_2025_saecham
  - shin_saecham_implementations
  process_participations: []
  influences:
  - source_family_id: cham
    relations:
    - improvement_of
    - variant_of
    - inspired_by
    note: SAECHAM restructures the operation order and rotation choices of CHAM-64/128
      for improved security and performance on constrained processors.
  notes: SAECHAM (Secure and Efficient CHAM) is an 88-round, 64-bit block cipher
    with a 128-bit key. It adopts the CHAM-RXA operation ordering selected from
    analyzed CHAM variants and targets efficient 8-, 16-, and 32-bit implementations.
