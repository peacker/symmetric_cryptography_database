    name: Multiply-then-XOR per byte with FNV_prime and non-zero offset_basis
    note: 'FNV-1 multiplies the n-bit accumulator by a carefully chosen prime (FNV_prime)
      and XOR-s in each input byte. The non-zero offset_basis (introduced over FNV-0)
      prevents trivial all-zero fixed points. 32-bit: FNV_prime=16777619, offset_basis=2166136261;
