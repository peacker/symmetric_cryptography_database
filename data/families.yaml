  innovative_ideas:
  - id: cham_four_branch_arx
    name: Four-branch ARX generalized Feistel design
    note: A compact four-word generalized Feistel structure using only modular addition,
      fixed rotations, XOR, and round counters.
  notes: The original CHAM family comprises CHAM-64/128, CHAM-128/128, and CHAM-128/256.
    The respective original round counts are 80, 80, and 96. CHAM is an S-box-free
    ARX design optimized for resource-constrained devices.
- id: cham_revised
  name: CHAM Revised
  construction_ids:
  - generalized_feistel
  round_ids:
  - cham_revised_round
  target_applications:
  - lightweight
  - embedded
  - iot
  - resource_constrained_devices
  characteristics:
    components:
    - id: add_mod
    - id: xor
    - id: rotation_fixed
    - id: constant
  reference_ids:
  - roh_et_al_2020_cham_revised
  - jeong_cham_implementation
  process_participations: []
  influences:
  - source_family_id: cham
    relations:
    - improvement_of
    - variant_of
    - same_round_function
    note: The revised specification retains the CHAM ARX round structure while increasing
      the round counts to strengthen its security margins.
  notes: Revised CHAM uses 88 rounds for CHAM-64/128, 112 rounds for CHAM-128/128,
    and 120 rounds for CHAM-128/256. The family retains four state words and the
    addition, rotation, XOR, subkey, and round-counter operations of CHAM.
- id: saecham
  name: SAECHAM
  construction_ids:
