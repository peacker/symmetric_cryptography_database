      '
  - id: argon2_three_variants
    name: Three variants for different threat models
    note: 'Argon2d uses data-dependent memory access (best tradeoff resistance, side-channel
      vulnerable), Argon2i uses data-independent access (side-channel safe, weaker
      tradeoff resistance), and Argon2id (primary recommended variant) uses Argon2i
      for the first half and Argon2d for the second half of each pass.

      '
  notes: 'Argon2 is a memory-hard password hashing function and KDF by Biryukov, Dinu,
    and Khovratovich (University of Luxembourg). PHC winner (2015). Standardised as
    RFC 9106 (IRTF CFRG, September 2021). Parameters: password P, salt S, parallelism
    p, tag length τ, memory m (KB), iterations t, version v, key K, data X. Three
    modes: Argon2d (data-dependent indexing), Argon2i (data-independent), Argon2id
    (hybrid). Core: compression function G = Blake2b permutation P applied row-wise
    and column-wise on 1024-byte blocks. Variable-length hash H'' based on BLAKE2b.
    Argon2id is the recommended variant for password hashing and password-based key
    derivation.

    '
