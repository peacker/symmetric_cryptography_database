    - round_2
    - winner
    status: winner
  influences: []
  innovative_ideas:
  - id: rijndael_8x8_sbox
    name: 8x8 S-box
    note: The byte-oriented S-box operating over GF(2^8) with affine inversion structure.
  - id: rijndael_shift_rows
    name: ShiftRows
    note: The row-rotation diffusion step used in the state matrix.
  - id: rijndael_mix_columns
    name: MixColumns
    note: The linear column-mixing layer that provides diffusion across bytes.
  notes: 'Rijndael supports variable block sizes (128, 192, 256 bits) and independently
    chosen key sizes. The AES standard restricts block size to 128 bits and standardises
    three key sizes, making AES a special case. The design follows the wide-trail
    lineage pioneered by SHARK and SQUARE.

    '
