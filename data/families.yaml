    note: XChaCha20 derives a subkey via HChaCha20 and then runs standard ChaCha20,
      extending the nonce from 96 to 192 bits.
  notes: 'XChaCha20 (Arciszewski, 2018; IETF draft) extends ChaCha20 to support a
    192-bit (24-byte) nonce by introducing the HChaCha20 subkey derivation: the first
    128 bits of the nonce are fed into a ChaCha20-like hash to produce a 256-bit subkey,
    which is then used with the remaining 64-bit nonce for standard ChaCha20. This
    makes random nonces safe for long-lived keys. XChaCha12 uses 12 rounds.'
