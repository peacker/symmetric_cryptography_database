  - id: lex_leak_extraction
    name: Leak extraction — outputting partial AES intermediate state as keystream
    note: 'LEX''s core idea is to extract ("leak") certain bytes of the AES intermediate
      state at each round instead of only using the final ciphertext. At each AES
      round, 4 bytes are leaked from specific positions of the 4×4 state matrix, giving
      40 bytes per AES invocation (vs 16 bytes for AES in CTR mode), while the attacker
      never sees the full intermediate state.

