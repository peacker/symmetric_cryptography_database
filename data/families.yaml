  influences:
  - source_family_id: salsa20
    relations:
    - improvement_of
    - same_round_function
    innovative_idea_ids:
    - salsa_arx_quarterround
    - salsa_column_diagonal_mixing
    note: 'ChaCha reorganises the Salsa quarterround to achieve better diffusion per
      round, improving resistance to differential cryptanalysis.

      '
