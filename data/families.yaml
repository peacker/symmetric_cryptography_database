    influences:
      - source_family_id: rijndael
        relations:
          - selection_of_possible_configurations
          - same_sbox
          - same_mix_column
          - same_shift_row
        innovative_idea_ids:
          - rijndael_8x8_sbox
          - rijndael_shift_rows
          - rijndael_mix_columns
        note: AES fixes Rijndael's block size to 128 bits and standardises three key sizes.
    innovative_ideas:
      - id: rijndael_8x8_sbox
        name: 8x8 S-box
