      '
  notes: 'Lucifer was an early IBM cipher (circa 1971-1973), the precursor to DES.
    The Sorkin (1983) description specifies a 128-bit block with 128-bit key and 16
    rounds. The key controls which of two 4-bit S-boxes (S₀ or S₁) is applied at each
    position per round. DES was derived from a later, weakened variant of Lucifer
    with a smaller block (64 bits).

    '
