    influences: []
    innovative_ideas:
      - id: decim_absg_decimation
        name: Adjacent Bit String Generator (ABSG) decimation
        note: >
          DECIM feeds filtered LFSR output into the ABSG mechanism which irregularly
          decimates the bitstream, concealing the underlying linear LFSR structure
          from algebraic and correlation attacks.
    notes: >
      DECIM is a binary additive synchronous stream cipher for hardware (eSTREAM 2005).
      State = 192-bit maximum-length LFSR (primitive polynomial P(X) of degree 192).
      The LFSR is filtered by a symmetric Boolean function f of 7 variables applied at
      two tap sets, producing a 2-bit input to the ABSG decimation mechanism per clock.
      Key=80 bits, IV=64 bits. Output rate is ~0.5 bits/clock due to decimation.

