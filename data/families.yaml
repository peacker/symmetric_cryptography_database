  influences: []
  notes: WAKE (Word Auto Key Encryption; Wheeler, 1993) is a fast software stream
    cipher operating on 32-bit words. It uses an 8-to-32-bit lookup table (derived
    from the key) to generate 32-bit keystream words via a self-synchronising auto-key
    mechanism. The cipher's strength depends entirely on the table and is considered
    weak by modern standards.
