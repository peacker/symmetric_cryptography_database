    note: 'SHA-1 improves on MD4/MD5 with a 160-bit state and a cross-mixing message
      schedule. SHA-2 extends to 256/384/512-bit digests and 64-bit words.

      '
  innovative_ideas:
  - id: sha_message_schedule
    name: Expanded message schedule mixing 16 input words into 80 (SHA-1) or 64/80
      (SHA-2) scheduled words
    note: 'SHA-1 generates 80 scheduled words via ROTL-1(W_{i-3} XOR W_{i-8} XOR W_{i-14}
      XOR W_{i-16}). SHA-256/512 use σ-functions (mix of rotations and shifts) to
      produce 64 or 80 words. This makes it infeasible to isolate single message word
      positions, unlike MD4''s direct word usage.

      '
  - id: sha2_wide_pipe
    name: SHA-256/384/512 extended word widths and digest sizes for higher security
    note: 'SHA-256 uses 8 × 32-bit words (256-bit state) with 64 rounds; SHA-512 uses
      8 × 64-bit words (512-bit state) with 80 rounds. SHA-384 truncates the SHA-512
      state to 384 bits. Per-round constants are derived from cube roots of the first
      64 (SHA-256) or 80 (SHA-512) prime numbers.

      '
  notes: 'SHA-1 (FIPS 180-1, 1995) is a 160-bit Merkle-Damgård hash function using
    Davies-Meyer feedforward. Block size: 512 bits. State: 5×32-bit words = 160 bits.
    80 rounds using a message schedule that expands 16 input words via ROTL-1(W_{i-3}
    ⊕ W_{i-8} ⊕ W_{i-14} ⊕ W_{i-16}). Four round functions: Ch (rounds 0–19), Parity
    (20–39), Maj (40–59), Parity (60–79). Constants derived from √2, √3, √5, √10.
    SHA-1 is deprecated for collision-sensitive uses (SHAttered attack, 2017). See
    sha2 family for the SHA-2 variants.'
