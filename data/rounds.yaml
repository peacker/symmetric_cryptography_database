version: 1
rounds:
- id: cham_round
  name: CHAM round
  kind: full_round
  spec:
    state_model:
      words: 4
      word_bits: 16_or_32
      state_bits: 64_or_128
    component_flow:
    - component_id: xor
    - component_id: rotation_fixed
    - component_id: add_mod
    - component_id: rotation_fixed
    constant_injection: round_counter_and_subkey
  notes: Original CHAM ARX round over four words. Even and odd rounds alternate
    one- and eight-bit rotations; the word size determines the addition modulus.
- id: cham_revised_round
  name: Revised CHAM round
  kind: full_round
  spec:
    state_model:
      words: 4
      word_bits: 16_or_32
      state_bits: 64_or_128
    component_flow:
    - component_id: xor
    - component_id: rotation_fixed
    - component_id: add_mod
    - component_id: rotation_fixed
    constant_injection: round_counter_and_subkey
  notes: Revised CHAM retains the original alternating ARX round structure and uses
    increased round counts for all three parameter sets.
- id: saecham_round
  name: SAECHAM round
  kind: full_round
  spec:
    state_model:
      words: 4
      word_bits: 16
      state_bits: 64
    component_flow:
    - component_id: rotation_fixed
    - component_id: xor
    - component_id: add_mod
      params:
        modulus: 65536
    constant_injection: round_counter_and_subkey
  notes: SAECHAM's CHAM-RXA-derived round restructures the order of rotation, XOR,
    and 16-bit modular addition. Even and odd rounds use distinct fixed rotations.
- id: rijndael_aes_round
  name: Rijndael/AES Full Round
  kind: full_round
  spec:
    state_model:
      layout: 4x4_bytes
      state_bits: 128
    component_flow:
    - component_id: sbox
      params:
        input_bits: 8
        output_bits: 8
    - component_id: word_permutation
      params:
        word_size_bits: 8
    - component_id: field_matrix_mul
      params:
        field_size: 256
    - component_id: xor
    constant_injection: round_constant
  notes: 'Canonical AES-like round: SubBytes, ShiftRows, MixColumns, AddRoundKey.
    Shared by Rijndael/AES variants modulo round count and first/last-round details.

    '
- id: salsa_quarterround
  name: Salsa Quarterround
  kind: quarterround
  spec:
    state_model:
      word_bits: 32
      words_touched: 4
    component_flow:
    - component_id: add_mod
      params:
        modulus: 4294967296
    - component_id: xor
    - component_id: rotation_fixed
    rotation_constants:
    - 7
    - 9
    - 13
    - 18
    constant_injection: none
  notes: 'Salsa quarterround over four 32-bit words with fixed rotation constants
    7, 9, 13, 18.

    '
- id: chacha_quarterround
  name: ChaCha Quarterround
  kind: quarterround
  spec:
    state_model:
      word_bits: 32
      words_touched: 4
    component_flow:
    - component_id: add_mod
      params:
        modulus: 4294967296
    - component_id: xor
    - component_id: rotation_fixed
    rotation_constants:
    - 16
    - 12
    - 8
    - 7
    constant_injection: none
  notes: 'ChaCha quarterround over four 32-bit words with fixed rotation constants
    16, 12, 8, 7.

    '
- id: present_round
  name: PRESENT Full Round
  kind: full_round
  spec:
    state_model:
      state_bits: 64
    component_flow:
    - component_id: xor
    - component_id: sbox
