    state_model:
      state_bits: 64
      branch_bits: 32
    component_flow:
    - component_id: bit_permutation
    - component_id: xor
    - component_id: sbox
      params:
        input_bits: 6
        output_bits: 4
    - component_id: bit_permutation
    constant_injection: none
  notes: 'DES Feistel round with expansion, subkey XOR, S-box substitution, and P-permutation.

    '
