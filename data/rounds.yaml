- id: sha1_round
  name: SHA-1 round
  kind: full_round
  spec:
    component_flow:
    - component_id: xor
    - component_id: rotation_fixed
    - component_id: shift_fixed
    - component_id: add_mod
      params:
        modulus: 4294967296
    - component_id: constant
    state_model:
      state_bits: 160
      word_bits: 32
      branches: 5
    constant_injection: subkey_and_round_constant
  notes: 'SHA-1 compression round: apply one of four Boolean functions (Ch/Parity/Maj)
    to the five 32-bit state words A–E, add the scheduled message word, a round constant,
    and ROTL-5(A); shift state. 80 rounds total.'
- id: sha2_32bit_round
  name: SHA-2 32-bit round (SHA-224/256)
  kind: full_round
  spec:
    component_flow:
    - component_id: rotation_fixed
    - component_id: shift_fixed
    - component_id: xor
    - component_id: and
    - component_id: not
    - component_id: add_mod
      params:
        modulus: 4294967296
    - component_id: constant
    state_model:
      state_bits: 256
      word_bits: 32
      branches: 8
    constant_injection: round_constant_and_message_word
  notes: 'SHA-256 compression round: T1 = h + Σ1(e) + Ch(e,f,g) + K[t] + W[t]; T2
    = Σ0(a) + Maj(a,b,c); shift state. Σ0 = ROTR-2 ⊕ ROTR-13 ⊕ ROTR-22; Σ1 = ROTR-6
    ⊕ ROTR-11 ⊕ ROTR-25. 64 rounds. SHA-224 uses the same compression function with
    different IVs and truncates the 256-bit state to 224 bits.'
- id: sha2_64bit_round
  name: SHA-2 64-bit round (SHA-384/512/512-224/512-256)
  kind: full_round
  spec:
    component_flow:
    - component_id: rotation_fixed
    - component_id: shift_fixed
    - component_id: xor
    - component_id: and
    - component_id: not
    - component_id: add_mod
      params:
        modulus: 18446744073709551616
    - component_id: constant
    state_model:
      state_bits: 512
      word_bits: 64
      branches: 8
    constant_injection: round_constant_and_message_word
  notes: 'SHA-512 compression round: identical structure to SHA-256 but on 64-bit
    words. Σ0 = ROTR-28 ⊕ ROTR-34 ⊕ ROTR-39; Σ1 = ROTR-14 ⊕ ROTR-18 ⊕ ROTR-41. 80
    rounds. SHA-384 and the /224 /256 variants share this compression function with
    distinct IVs and truncated output.'
