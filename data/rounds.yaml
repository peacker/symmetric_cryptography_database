version: 1

rounds:
  - id: rijndael_aes_round
    name: Rijndael/AES Full Round
    kind: full_round
    spec:
      state_model:
        layout: 4x4_bytes
        state_bits: 128
      component_flow:
        - component_id: sbox
          params: {input_bits: 8, output_bits: 8}
        - component_id: word_permutation
          params: {word_size_bits: 8}
        - component_id: field_matrix_mul
          params: {field_size: 256}
        - component_id: xor
      constant_injection: round_constant
    notes: >
      Canonical AES-like round: SubBytes, ShiftRows, MixColumns,
      AddRoundKey. Shared by Rijndael/AES variants modulo round count and
      first/last-round details.

  - id: salsa_quarterround
    name: Salsa Quarterround
    kind: quarterround
    spec:
      state_model:
        word_bits: 32
        words_touched: 4
      component_flow:
        - component_id: add_mod
          params: {modulus: 4294967296}
        - component_id: xor
        - component_id: rotation_fixed
      rotation_constants: [7, 9, 13, 18]
      constant_injection: none
    notes: >
      Salsa quarterround over four 32-bit words with fixed rotation
      constants 7, 9, 13, 18.

  - id: chacha_quarterround
    name: ChaCha Quarterround
    kind: quarterround
    spec:
      state_model:
        word_bits: 32
        words_touched: 4
      component_flow:
        - component_id: add_mod
          params: {modulus: 4294967296}
        - component_id: xor
        - component_id: rotation_fixed
      rotation_constants: [16, 12, 8, 7]
      constant_injection: none
    notes: >
      ChaCha quarterround over four 32-bit words with fixed rotation
      constants 16, 12, 8, 7.

  - id: present_round
    name: PRESENT Full Round
    kind: full_round
    spec:
      state_model:
        state_bits: 64
      component_flow:
        - component_id: xor
        - component_id: sbox
          params: {input_bits: 4, output_bits: 4}
        - component_id: bit_permutation
      constant_injection: round_counter
    notes: >
      PRESENT round with addRoundKey, 4-bit S-box layer, and P-layer.

  - id: gift_round
    name: GIFT Full Round
    kind: full_round
    spec:
      state_model:
        state_bits_options: [64, 128]
      component_flow:
        - component_id: sbox
          params: {input_bits: 4, output_bits: 4}
        - component_id: bit_permutation
        - component_id: xor
      constant_injection: round_constant
    notes: >
      GIFT round with nibble S-box layer, bit permutation layer,
      and key/constant injection.

  - id: des_round
    name: DES Feistel Round
    kind: full_round
    spec:
      state_model:
        state_bits: 64
        branch_bits: 32
      component_flow:
        - component_id: bit_permutation
        - component_id: xor
        - component_id: sbox
          params: {input_bits: 6, output_bits: 4}
        - component_id: bit_permutation
      constant_injection: none
    notes: >
      DES Feistel round with expansion, subkey XOR, S-box substitution,
      and P-permutation.

  - id: blowfish_round
    name: Blowfish Feistel Round
    kind: full_round
    spec:
      state_model:
        state_bits: 64
        branch_bits: 32
      component_flow:
        - component_id: add_mod
          params: {modulus: 4294967296}
        - component_id: sbox
          params: {input_bits: 8, output_bits: 32}
        - component_id: xor
      constant_injection: none
    notes: >
      Blowfish Feistel round using key-dependent S-boxes and ARX mixing in F.

  - id: idea_round
    name: IDEA Round
    kind: full_round
    spec:
      state_model:
        state_bits: 64
        word_bits: 16
      component_flow:
        - component_id: add_mod
          params: {modulus: 65536}
        - component_id: mul_mod
          params: {modulus: 65537}
        - component_id: xor
      constant_injection: none
    notes: >
      IDEA round using mixed-group operations (mod 2^16 addition,
      mod 2^16+1 multiplication, XOR).

  - id: tea_round
    name: TEA Round Pair
    kind: full_round
    spec:
      state_model:
        state_bits: 64
        word_bits: 32
      component_flow:
        - component_id: add_mod
          params: {modulus: 4294967296}
        - component_id: xor
        - component_id: shift_fixed
          params: {amount: 4}
        - component_id: shift_fixed
          params: {amount: 5}
        - component_id: constant
      constant_injection: delta_constant
    notes: >
      One TEA cycle (two Feistel rounds) with delta constant accumulation.

  - id: xtea_round
    name: XTEA Round Pair
    kind: full_round
    spec:
      state_model:
        state_bits: 64
        word_bits: 32
      component_flow:
        - component_id: add_mod
          params: {modulus: 4294967296}
        - component_id: xor
        - component_id: shift_fixed
          params: {amount: 4}
        - component_id: shift_fixed
          params: {amount: 5}
        - component_id: constant
      constant_injection: delta_constant
    notes: >
      One XTEA cycle (two Feistel rounds) with revised key schedule.

  - id: twofish_round
    name: Twofish Round
    kind: full_round
    spec:
      state_model:
        state_bits: 128
      component_flow:
        - component_id: sbox
          params: {input_bits: 8, output_bits: 8}
        - component_id: field_matrix_mul
          params: {field_size: 256}
        - component_id: xor
        - component_id: rotation_fixed
      constant_injection: subkeys
    notes: >
      Twofish round with key-dependent S-boxes, MDS mixing,
      pseudo-Hadamard transform, and rotations.

  - id: serpent_round
    name: Serpent Round
    kind: full_round
    spec:
      state_model:
        state_bits: 128
      component_flow:
        - component_id: xor
        - component_id: sbox
          params: {input_bits: 4, output_bits: 4}
        - component_id: binary_matrix_mul
      constant_injection: round_key
    notes: >
      Serpent round with key mixing, bitslice 4x4 S-box layer,
      and linear transformation.

  - id: camellia_round
    name: Camellia Feistel Round
    kind: full_round
    spec:
      state_model:
        state_bits: 128
        branch_bits: 64
      component_flow:
        - component_id: xor
        - component_id: sbox
          params: {input_bits: 8, output_bits: 8}
        - component_id: binary_matrix_mul
        - component_id: xor
      constant_injection: subkeys
    notes: >
      Camellia Feistel round using F-function S-box/linear layer;
      FL/FLINV layers are inserted every six rounds.

  - id: simon_round
    name: SIMON Round
    kind: full_round
    spec:
      state_model:
        state_bits_options: [32, 48, 64, 96, 128]
      component_flow:
        - component_id: rotation_fixed
        - component_id: and
        - component_id: xor
        - component_id: constant
      constant_injection: z_sequence
    notes: >
      SIMON Feistel round using AND/XOR and rotations with round constants.

  - id: speck_round
    name: SPECK Round
    kind: full_round
    spec:
      state_model:
        state_bits_options: [32, 48, 64, 96, 128]
      component_flow:
        - component_id: rotation_fixed
        - component_id: add_mod
          params: {modulus: 4294967296}
        - component_id: xor
      constant_injection: round_key
    notes: >
      SPECK ARX round using opposite-direction rotations, modular addition,
      and XOR with round key.

  - id: prince_round
    name: PRINCE Core Round
    kind: full_round
    spec:
      state_model:
        state_bits: 64
      component_flow:
        - component_id: sbox
          params: {input_bits: 4, output_bits: 4}
        - component_id: binary_matrix_mul
        - component_id: xor
        - component_id: constant
      constant_injection: round_constant
    notes: >
      PRINCE forward/backward core round with S-layer and linear mixing.

  - id: led_round
    name: LED Step Round
    kind: step
    spec:
      state_model:
        state_bits: 64
      component_flow:
        - component_id: sbox
          params: {input_bits: 4, output_bits: 4}
        - component_id: word_permutation
          params: {word_size_bits: 4}
        - component_id: field_matrix_mul
          params: {field_size: 16}
        - component_id: xor
      constant_injection: step_constant
    notes: >
      LED step transformation (SubCells, ShiftRows, MixColumnsSerial,
      AddConstants/AddRoundKey).

  - id: katan_round
    name: KATAN Update Round
    kind: step
    spec:
      state_model:
        state_bits_options: [32, 48, 64]
      component_flow:
        - component_id: lfsr
        - component_id: nlfsr
        - component_id: and
        - component_id: xor
        - component_id: constant
      constant_injection: irregular_sequence
    notes: >
      KATAN round as coupled shift-register updates with non-linear taps.

  - id: ktantan_round
    name: KTANTAN Update Round
    kind: step
    spec:
      state_model:
        state_bits_options: [32, 48, 64]
      component_flow:
        - component_id: lfsr
        - component_id: nlfsr
        - component_id: and
        - component_id: xor
        - component_id: constant
      constant_injection: irregular_sequence
    notes: >
      KTANTAN hardware-embedded-key update round; structurally related to KATAN.

  - id: cast128_round
    name: CAST-128 Feistel Round
    kind: full_round
    spec:
      state_model:
        state_bits: 64
        branch_bits: 32
      component_flow:
        - component_id: add_mod
          params: {modulus: 4294967296}
        - component_id: sub_mod
          params: {modulus: 4294967296}
        - component_id: xor
        - component_id: sbox
          params: {input_bits: 8, output_bits: 32}
        - component_id: rotation_variable
      constant_injection: subkeys
    notes: >
      CAST-128 round family uses key-dependent choice of F-function type
      (add/sub/xor + data-dependent rotate + S-box mix) in a Feistel structure.

  - id: cast256_round
    name: CAST-256 Quad-Round
    kind: full_round
    spec:
      state_model:
        state_bits: 128
        branch_bits: 32
        branches: 4
      component_flow:
        - component_id: add_mod
          params: {modulus: 4294967296}
        - component_id: sub_mod
          params: {modulus: 4294967296}
        - component_id: xor
        - component_id: sbox
          params: {input_bits: 8, output_bits: 32}
        - component_id: rotation_variable
      constant_injection: subkeys
    notes: >
      CAST-256 uses CAST-style round functions arranged in a 4-branch
      generalized Feistel schedule.

  - id: rc5_round
    name: RC5 Data-Dependent Round
    kind: full_round
    spec:
      state_model:
        state_bits_options: [32, 64, 128]
      component_flow:
        - component_id: xor
        - component_id: rotation_variable
        - component_id: add_mod
          params: {modulus: 4294967296}
      constant_injection: subkeys
    notes: >
      RC5 round core with XOR, data-dependent rotation, and modular addition.

  - id: seed_round
    name: SEED Feistel Round
    kind: full_round
    spec:
      state_model:
        state_bits: 128
        branch_bits: 64
      component_flow:
        - component_id: xor
        - component_id: sbox
          params: {input_bits: 8, output_bits: 8}
        - component_id: add_mod
          params: {modulus: 4294967296}
        - component_id: sub_mod
          params: {modulus: 4294967296}
        - component_id: rotation_fixed
      constant_injection: subkeys
    notes: >
      SEED 16-round Feistel structure with keyed round function over two
      32-bit words, using S-box layers and modular arithmetic.

  - id: aria_round
    name: ARIA Round
    kind: full_round
    spec:
      state_model:
        state_bits: 128
      component_flow:
        - component_id: xor
        - component_id: sbox
          params: {input_bits: 8, output_bits: 8}
        - component_id: binary_matrix_mul
      constant_injection: round_keys
    notes: >
      ARIA alternates two substitution layers and a linear diffusion layer;
      round count depends on key length.

  - id: rc6_round
    name: RC6 Round
    kind: full_round
    spec:
      state_model:
        state_bits: 128
        word_bits: 32
      component_flow:
        - component_id: xor
        - component_id: mul_mod
          params: {modulus: 4294967296}
        - component_id: rotation_variable
        - component_id: add_mod
          params: {modulus: 4294967296}
      constant_injection: subkeys
    notes: >
      RC6 ARX-style round with data-dependent rotation and integer multiplication.

  - id: sm4_round
    name: SM4 Round
    kind: full_round
    spec:
      state_model:
        state_bits: 128
        word_bits: 32
      component_flow:
        - component_id: xor
        - component_id: sbox
          params: {input_bits: 8, output_bits: 8}
        - component_id: rotation_fixed
        - component_id: xor
      constant_injection: round_constants
    notes: >
      SM4 32-round update with tau non-linear substitution and linear diffusion.

  - id: kasumi_round
    name: KASUMI Round
    kind: full_round
    spec:
      state_model:
        state_bits: 64
        branch_bits: 32
      component_flow:
        - component_id: xor
        - component_id: and
        - component_id: or
        - component_id: rotation_fixed
        - component_id: sbox
          params: {input_bits: 8, output_bits: 8}
      constant_injection: subkeys
    notes: >
      KASUMI Feistel round composed from FL and FO/FI subfunctions.

  - id: clefia_round
    name: CLEFIA GFN Round
    kind: full_round
    spec:
      state_model:
        state_bits: 128
        branches: 4
      component_flow:
        - component_id: xor
        - component_id: sbox
          params: {input_bits: 8, output_bits: 8}
        - component_id: binary_matrix_mul
      constant_injection: subkeys
    notes: >
      CLEFIA uses a 4-branch generalized Feistel network in the data path.

  - id: twine_round
    name: TWINE Round
    kind: full_round
    spec:
      state_model:
        state_bits: 64
        branches: 16
        nibble_bits: 4
      component_flow:
        - component_id: sbox
          params: {input_bits: 4, output_bits: 4}
        - component_id: xor
        - component_id: word_permutation
          params: {word_size_bits: 4}
      constant_injection: round_constants
    notes: >
      TWINE is a lightweight 16-branch generalized Feistel block cipher.

  # ── AES Candidates ─────────────────────────────────────────────────────

  - id: crypton_round
    name: CRYPTON Round
    kind: full_round
    spec:
      state_model:
        state_bits: 128
      component_flow:
        - component_id: xor
        - component_id: sbox
          params: {input_bits: 8, output_bits: 8}
        - component_id: word_permutation
          params: {word_size_bits: 8}
        - component_id: binary_matrix_mul
      constant_injection: round_constants
    notes: >
      CRYPTON SPN round with byte substitution, word permutation,
      and linear diffusion layer.

  - id: deal_round
    name: DEAL Round
    kind: full_round
    spec:
      state_model:
        state_bits: 128
        branch_bits: 64
      component_flow:
        - component_id: xor
        - component_id: sbox
          params: {input_bits: 6, output_bits: 4}
        - component_id: bit_permutation
      constant_injection: subkeys
    notes: >
      DEAL Feistel round with DES as the inner round function;
      each 128-bit round uses a full DES encryption on the 64-bit branch.

  - id: dfc_round
    name: DFC Round
    kind: full_round
    spec:
      state_model:
        state_bits: 128
        branch_bits: 64
      component_flow:
        - component_id: mul_mod
          params: {modulus: 9223372036854775807}
        - component_id: add_mod
          params: {modulus: 18446744073709551616}
        - component_id: sbox
          params: {input_bits: 8, output_bits: 8}
        - component_id: xor
      constant_injection: subkeys
    notes: >
      DFC Feistel round using affine mapping over near-prime field
      combined with an S-box for decorrelation.

  - id: e2_round
    name: E2 Round
    kind: full_round
    spec:
      state_model:
        state_bits: 128
        branch_bits: 64
      component_flow:
        - component_id: xor
        - component_id: sbox
          params: {input_bits: 8, output_bits: 8}
        - component_id: rotation_fixed
        - component_id: add_mod
          params: {modulus: 4294967296}
      constant_injection: subkeys
    notes: >
      E2 Feistel round with initial and final key mixing layers (IT/FT)
      and a bijective round function using S-boxes and byte operations.

  - id: frog_round
    name: FROG Round
    kind: full_round
    spec:
      state_model:
        state_bits: 128
      component_flow:
        - component_id: xor
        - component_id: sbox
          params: {input_bits: 8, output_bits: 8}
        - component_id: word_permutation
          params: {word_size_bits: 8}
        - component_id: xor
      constant_injection: internal_key
    notes: >
      FROG round uses a pseudo-random permutation derived from the key;
      each of the eight rounds applies key-dependent byte permutations and S-boxes.

  - id: hpc_round
    name: HPC Round
    kind: full_round
    spec:
      state_model:
        state_bits: 128
      component_flow:
        - component_id: xor
        - component_id: add_mod
          params: {modulus: 4294967296}
        - component_id: sbox
          params: {input_bits: 8, output_bits: 8}
        - component_id: rotation_fixed
      constant_injection: subkeys
    notes: >
      Hasty Pudding Cipher round using spice values and key-derived
      tables; structure varies with block size (tiny/short/medium/standard/extended).

  - id: loki97_round
    name: LOKI97 Round
    kind: full_round
    spec:
      state_model:
        state_bits: 128
        branch_bits: 64
      component_flow:
        - component_id: xor
        - component_id: sbox
          params: {input_bits: 13, output_bits: 8}
        - component_id: rotation_fixed
        - component_id: binary_matrix_mul
      constant_injection: subkeys
    notes: >
      LOKI97 Feistel round with large permuted S-box (13-bit input),
      linear transformation, and complex key schedule.

  - id: magenta_round
    name: MAGENTA Round
    kind: full_round
    spec:
      state_model:
        state_bits: 128
        branch_bits: 64
      component_flow:
        - component_id: xor
        - component_id: sbox
          params: {input_bits: 8, output_bits: 8}
        - component_id: field_matrix_mul
          params: {field_size: 256}
      constant_injection: subkeys
    notes: >
      MAGENTA Feistel round using the PE function built recursively
      from GF(2^8) multiply and S-box operations.

  - id: mars_round
    name: MARS Round
    kind: full_round
    spec:
      state_model:
        state_bits: 128
        word_bits: 32
      component_flow:
        - component_id: add_mod
          params: {modulus: 4294967296}
        - component_id: xor
        - component_id: mul_mod
          params: {modulus: 4294967296}
        - component_id: rotation_variable
        - component_id: sbox
          params: {input_bits: 8, output_bits: 32}
        - component_id: rotation_fixed
      constant_injection: subkeys
    notes: >
      MARS heterogeneous structure: mixing phases use ARX; keying phases
      use E-function with S-boxes, integer multiplication, and data-dependent rotations.

  - id: safer_plus_round
    name: SAFER+ Round
    kind: full_round
    spec:
      state_model:
        state_bits: 128
      component_flow:
        - component_id: xor
        - component_id: add_mod
          params: {modulus: 256}
        - component_id: sbox
          params: {input_bits: 8, output_bits: 8}
        - component_id: sub_mod
          params: {modulus: 256}
        - component_id: binary_matrix_mul
      constant_injection: round_keys
    notes: >
      SAFER+ SPN round with alternating XOR/byte-add key mixing,
      exponential/logarithm S-boxes, and Pseudo-Hadamard Transform (PHT) diffusion.