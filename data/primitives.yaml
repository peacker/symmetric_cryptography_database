version: 1
primitives:
  # ── AES family ────────────────────────────────────────────────────────────
  - id: aes_128
    name: AES-128
    family_id: aes
    primitive_type: block_cipher
    characteristics:
      key_size_bits: 128
      rounds: 10
      fixed_input_bits: 128
      fixed_output_bits: 128

  - id: aes_192
    name: AES-192
    family_id: aes
    primitive_type: block_cipher
    characteristics:
