- id: argon2d
  name: Argon2d
  family_id: argon2
  primitive_type: pbkdf
  reference_ids:
  - rfc_9106_argon2
  characteristics:
    output_size_bits: 256
    notes: Data-dependent memory access; best resistance to time-space tradeoffs;
      vulnerable to side-channel timing attacks; not recommended for password hashing.
  notes: 'Argon2d uses data-dependent memory indexing. For each block position, the
    reference block is chosen based on the current block content, making it optimal
    for proof-of-work and cryptocurrency applications where side-channel timing attacks
    are not a concern. Parameters: memory m KB, iterations t, parallelism p, salt
    s, tag length τ.

    '
- id: argon2i
  name: Argon2i
  family_id: argon2
  primitive_type: pbkdf
  reference_ids:
  - rfc_9106_argon2
  characteristics:
    output_size_bits: 256
    notes: Data-independent memory access; side-channel safe; weaker tradeoff resistance
      than Argon2d.
  notes: 'Argon2i uses data-independent memory indexing (computed from a counter and
    pass number). Safe against side-channel timing attacks. Preferred for password
    hashing when side-channel attacks are a concern. Requires more passes (≥3) than
    Argon2id for equivalent tradeoff resistance. RFC 9106: MAY be supported.

    '
- id: argon2id
  name: Argon2id
  family_id: argon2
  primitive_type: pbkdf
  reference_ids:
  - biryukov_et_al_2017_argon2_v13
  - rfc_9106_argon2
  characteristics:
    output_size_bits: 256
    notes: 'Hybrid: Argon2i for first half of first pass, Argon2d thereafter; primary
      recommended variant.'
  notes: 'Argon2id is the primary recommended variant (RFC 9106: MUST be supported).
    Uses Argon2i for the first half of the first pass over memory and Argon2d for
    all remaining memory fills. Provides both side-channel protection and strong resistance
    against time-space tradeoff attacks. PHC winner variant. Recommended for all password
    hashing and password-based key derivation applications.

    '
