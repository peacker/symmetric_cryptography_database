      output_size_bits: 512
    notes: >-
      ChaCha20 block function per RFC 8439: takes a 256-bit key, 96-bit nonce,
      and 32-bit block counter to produce a 512-bit (64-byte) output.
      Applies 20 quarterrounds (10 double-rounds) in a symmetric pattern.

