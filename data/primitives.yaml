      key_size_bits: 256
      rounds: 14
      fixed_input_bits: 128
      fixed_output_bits: 128

  # ── Salsa family ──────────────────────────────────────────────────────────
  - id: salsa20
    name: Salsa20 Block Function
    family_id: salsa
    primitive_type: permutation
    characteristics:
      key_size_bits: 256
      nonce_size_bits: 64
      rounds: 20
      fixed_input_bits: 512
      fixed_output_bits: 512
    notes: >-
      Salsa20 block function takes a 256-bit key, 64-bit nonce,
      and a 64-bit block counter to produce a 512-bit (64-byte) output.
      Applies 20 quarterrounds in a symmetric pattern.

  # ── ChaCha family ─────────────────────────────────────────────────────────
  - id: chacha20
    name: ChaCha20 Block Function
    family_id: chacha
    primitive_type: permutation
    characteristics:
      key_size_bits: 256
      nonce_size_bits: 96
      block_count_bits: 32
      rounds: 20
      fixed_input_bits: 512
      fixed_output_bits: 512
    notes: >-
      ChaCha20 block function per RFC 8439: takes a 256-bit key, 96-bit nonce,
      and 32-bit block counter to produce a 512-bit (64-byte) output.
      Applies 20 quarterrounds (10 double-rounds) in a symmetric pattern.

