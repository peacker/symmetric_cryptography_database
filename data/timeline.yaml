  - id: arx_boom
    name: boom of ARX designs
    start_year: 2005
    end_year: 2015
    notes: >-
      Boom of ARX started with the eSTREAM competition and continued through
      SHA-3 selection. It slowed down once chipmakers began integrating
      dedicated hardware acceleration for S-Box ciphers (notably AES-NI).

